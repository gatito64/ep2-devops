# EP2 DevOpss
networks:
  app-network:
    driver: bridge

volumes:
  mysql_data:

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: despachos_db
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

  backend-despachos:
    build: ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
    environment:
      DB_ENDPOINT: db
      DB_PORT: 3306
      DB_NAME: despachos_db
      DB_USERNAME: root
      DB_PASSWORD: root1234
    networks:
      - app-network
    depends_on:
      - db

  frontend:
    build: ./front_despacho
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend-despachos
