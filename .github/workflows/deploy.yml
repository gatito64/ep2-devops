name: CI/CD Deploy

on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Frontend
        run: |
          docker build -t isaac010604/frontend:latest ./front_despacho
          docker push isaac010604/frontend:latest

      - name: Build & Push Backend
        run: |
          docker build -t isaac010604/backend-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
          docker push isaac010604/backend-despachos:latest

      - name: Deploy en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username:
